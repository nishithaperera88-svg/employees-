<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Manager Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
       .container {
            max-width: 1200px;
            margin: 0 auto;
        }
       .header {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
       .header h1 {
            color: #3b82f6;
            font-size: 24px;
        }
       .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #10b981;
            color: white;
        }
       .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
       .card h2 {
            color: #3b82f6;
            margin-bottom: 20px;
            font-size: 20px;
        }
       .form-group {
            margin-bottom: 15px;
        }
       .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
       .form-group input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
        }
       .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
       .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
       .btn-success {
            background: #10b981;
            color: white;
            width: 100%;
        }
       .btn-success:hover {
            background: #059669;
        }
       .btn-danger {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
        }
       .btn-danger:hover {
            background: #dc2626;
        }
       .employee-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
       .employee-info h3 {
            color: #e2e8f0;
            margin-bottom: 5px;
            font-size: 18px;
        }
       .employee-info p {
            color: #94a3b8;
            font-size: 14px;
        }
       .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
       .toast.success { background: #10b981; }
       .toast.error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }
       .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
       .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
       .stat-card h3 {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 10px;
        }
       .stat-card p {
            color: #3b82f6;
            font-size: 32px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Workshop Manager Pro</h1>
            <span class="status-badge">Offline Mode - Auto Save</span>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>මුළු සේවකයින්</h3>
                <p id="totalEmployees">0</p>
            </div>
            <div class="stat-card">
                <h3>මුළු Salary</h3>
                <p id="totalSalary">Rs. 0</p>
            </div>
        </div>

        <div class="card">
            <h2>නව සේවකයෙක් එකතු කරන්න</h2>
            <div class="form-group">
                <label>සේවකයාගේ නම</label>
                <input type="text" id="empName" placeholder="උදා: Nimal Perera">
            </div>
            <div class="form-group">
                <label>Basic Salary (Rs.)</label>
                <input type="number" id="empSalary" placeholder="උදා: 50000">
            </div>
            <div class="form-group">
                <label>Phone Number (Optional)</label>
                <input type="text" id="empPhone" placeholder="උදා: 0771234567">
            </div>
            <button class="btn btn-success" id="addEmpBtn">+ Add Employee</button>
        </div>

        <div class="card">
            <h2>සේවක ලැයිස්තුව <span id="empCount" style="color: #64748b; font-size: 16px;"></span></h2>
            <div id="employeeList">
                <p style="color: #64748b; text-align: center; padding: 40px 0;">තවම සේවකයින් නෑ. උඩින් Add කරන්න.</p>
            </div>
        </div>
    </div>

    <script>
        const EMPLOYEES_KEY = 'workshop_employees_noauth';

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function getEmployees() {
            return JSON.parse(localStorage.getItem(EMPLOYEES_KEY) || '[]');
        }

        function saveEmployees(employees) {
            localStorage.setItem(EMPLOYEES_KEY, JSON.stringify(employees));
            updateStats();
        }

        function updateStats() {
            const employees = getEmployees();
            const totalSalary = employees.reduce((sum, emp) => sum + emp.salary, 0);

            document.getElementById('totalEmployees').textContent = employees.length;
            document.getElementById('totalSalary').textContent = 'Rs. ' + totalSalary.toLocaleString();
            document.getElementById('empCount').textContent = employees.length > 0? `(${employees.length})` : '';
        }

        function renderEmployees() {
            const employees = getEmployees();
            const list = document.getElementById('employeeList');

            if (employees.length === 0) {
                list.innerHTML = '<p style="color: #64748b; text-align: center; padding: 40px 0;">තවම සේවකයින් නෑ. උඩින් Add කරන්න.</p>';
                updateStats();
                return;
            }

            list.innerHTML = employees.map((emp, idx) => `
                <div class="employee-item">
                    <div class="employee-info">
                        <h3>${emp.name}</h3>
                        <p>Salary: Rs. ${emp.salary.toLocaleString()} ${emp.phone? '| Phone: ' + emp.phone : ''}</p>
                    </div>
                    <button class="btn btn-danger" onclick="deleteEmployee(${idx})">Delete</button>
                </div>
            `).join('');

            updateStats();
        }

        function deleteEmployee(index) {
            if (!confirm('මේ සේවකයව අයින් කරන්නද?')) return;

            const employees = getEmployees();
            const deletedName = employees[index].name;
            employees.splice(index, 1);
            saveEmployees(employees);
            renderEmployees();
            showToast(`${deletedName} අයින් කළා`, 'success');
        }

        document.getElementById('addEmpBtn').addEventListener('click', () => {
            const name = document.getElementById('empName').value.trim();
            const salary = parseFloat(document.getElementById('empSalary').value);
            const phone = document.getElementById('empPhone').value.trim();

            if (!name ||!salary) {
                showToast('නම සහ Salary අනිවාර්යයි', 'error');
                return;
            }

            if (salary <= 0) {
                showToast('Salary එක 0ට වඩා වැඩි වෙන්න ඕන', 'error');
                return;
            }

            const employees = getEmployees();
            employees.push({
                name,
                salary,
                phone: phone || '',
                id: Date.now(),
                createdAt: new Date().toISOString()
            });

            saveEmployees(employees);
            renderEmployees();

            document.getElementById('empName').value = '';
            document.getElementById('empSalary').value = '';
            document.getElementById('empPhone').value = '';
            showToast(`${name} add කළා!`, 'success');
        });

        // Page load වෙනකොට employees load කරන්න
        renderEmployees();
    </script>
</body>
</html>
