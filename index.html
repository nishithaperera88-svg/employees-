<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Manager Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .hidden { display: none !important; }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-box h1 {
            color: #3b82f6;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }
        .app-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-online {
            background: #10b981;
            color: white;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h1>Workshop Manager Login</h1>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="authEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="authPassword" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" id="loginBtn">Login</button>
            <button class="btn btn-success" id="signupBtn">Sign Up</button>
            <p style="text-align: center; margin-top: 20px; color: #64748b; font-size: 14px;">
                Free account එකක් හදලා use කරන්න
            </p>
        </div>
    </div>

    <div id="appScreen" class="app-container hidden">
        <div class="header">
            <h1>Workshop Manager Pro</h1>
            <div>
                <span class="status-badge status-online">Online - Real-time</span>
                <button class="btn btn-primary" id="logoutBtn" style="width: auto; margin-left: 10px; padding: 8px 16px;">Logout</button>
            </div>
        <div id="employeeList">
            <h2 style="margin-bottom: 20px;">සේවකයින්</h2>
            <p id="noEmployees" style="color: #64748b;">No employees yet. Add one to start!</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // මෙන්න හරිම URL සහ KEY එක
        const SUPABASE_URL = 'https://usgnfoytwamwkxmrxjl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RJLCIyDwOmdImbyVpjy3rg_cj49EnEk';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginScreen = document.getElementById('loginScreen');
        const appScreen = document.getElementById('appScreen');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        signupBtn.addEventListener('click', async () => {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            
            if (!email || !password) {
                showToast('Email සහ Password දෙන්න', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password එක අඩුම characters 6ක් වෙන්න ඕන', 'error');
                return;
            }
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
            });
            
            if (error) {
                showToast(error.message, 'error');
            } else {
                showToast('Account හදලා! දැන් Login වෙන්න', 'success');
                document.getElementById('authPassword').value = '';
            }
        });

        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            
            if (!email || !password) {
                showToast('Email සහ Password දෙන්න', 'error');
                return;
            }
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });
            
            if (error) {
                showToast(error.message, 'error');
            } else {
                showToast('Login වුනා!', 'success');
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            showToast('Logout වුනා', 'success');
        });

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
            } else {
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
